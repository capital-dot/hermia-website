<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermia | Simpro Setup Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #111;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.1);
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .back-btn {
            color: #D4AF37;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:window.close()" class="back-btn">← Close Video</a>
    </div>
    <div class="container">
        <iframe src="https://www.loom.com/embed/ad22112fd7cb49979597bab590f0653d?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>
    </div>
</body>
</html>
