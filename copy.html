<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hermia – Copy Alias</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#F2EBD9;font-family:Georgia,serif;color:#2a2620;}
  .card{background:#FFFEF9;border:1px solid #d9c79a;border-radius:8px;
    padding:48px 40px;text-align:center;max-width:460px;width:90%;}
  .logo{height:44px;margin-bottom:32px;}
  .label{font-size:10px;color:#9c7209;text-transform:uppercase;letter-spacing:2px;
    font-weight:bold;margin-bottom:10px;}
  .alias{font-family:'Courier New',monospace;font-size:14px;background:#fff;
    border:1px solid #d9c79a;border-radius:4px;padding:12px 16px;
    word-break:break-all;margin-bottom:24px;color:#2a2620;}
  .btn{display:block;width:100%;background:#B8860B;color:#fff;border:none;
    padding:16px 36px;font-size:13px;font-weight:bold;letter-spacing:1.5px;
    text-transform:uppercase;border-radius:4px;cursor:pointer;box-sizing:border-box;}
  .btn.done{background:#4a7c59;}
  .status{margin-top:16px;font-size:13px;color:#9c7209;min-height:20px;}
</style>
</head>
<body>
<div class="card">
  <img src="https://raw.githubusercontent.com/capital-dot/hermia-connect/main/logo.png"
       alt="Hermia" class="logo"/>
  <div class="label">Your lead alias</div>
  <div class="alias" id="alias">Loading…</div>
  <button class="btn" id="btn" onclick="copyAlias()">Copy Alias</button>
  <div class="status" id="status"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const alias = params.get("alias") || "";
  document.getElementById("alias").textContent = alias || "No alias found.";
  if (alias) copyAlias();

  function copyAlias() {
    if (!alias) return;
    navigator.clipboard.writeText(alias).then(() => {
      document.getElementById("btn").textContent = "Copied ✓";
      document.getElementById("btn").classList.add("done");
      document.getElementById("status").textContent = "Ready to paste into Gmail.";
    }).catch(() => {
      const el = document.createElement("textarea");
      el.value = alias;
      document.body.appendChild(el);
      el.select();
      document.execCommand("copy");
      document.body.removeChild(el);
      document.getElementById("btn").textContent = "Copied ✓";
      document.getElementById("btn").classList.add("done");
      document.getElementById("status").textContent = "Ready to paste into Gmail.";
    });
  }
</script>
</body>
</html>
