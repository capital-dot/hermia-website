<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermia - Lost Lead Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #080808;
            --card: #111111;
            --border: rgba(201,163,91,0.15);
            --gold: #C9A35B;
            --gold-light: #e8c17a;
            --gold-dim: rgba(201,163,91,0.08);
            --cream: #f5f1e8;
            --muted: #8a8580;
            --soft: #b8b5ad;
            --danger: #ef4444;
            --emerald: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            color: var(--cream);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--cream);
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--soft);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        /* Calculator Card */
        .calculator-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--soft);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 16px;
            color: var(--muted);
            font-weight: 500;
        }

        input[type="number"], input[type="range"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 8px;
            color: var(--cream);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="number"]:focus {
            border-color: var(--gold);
        }

        .has-prefix {
            padding-left: 32px !important;
        }

        /* Slider Specific Styling */
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            padding: 0;
            height: 6px;
            background: rgba(201,163,91,0.2);
            border: none;
            border-radius: 3px;
            outline: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Results Display */
        .results-box {
            background: var(--gold-dim);
            border: 1px solid rgba(201,163,91,0.3);
            border-radius: 12px;
            padding: 24px;
            margin-top: 32px;
            text-align: center;
        }

        .results-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .loss-amount {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 4px;
        }

        .annual-loss {
            font-size: 0.95rem;
            color: var(--soft);
        }

        /* CTA Section */
        .cta-section {
            margin-top: 20px;
        }

        .btn-primary {
            display: inline-block;
            background: var(--gold);
            color: var(--black);
            font-weight: 600;
            padding: 16px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.05rem;
            transition: background 0.2s ease, transform 0.2s ease;
            box-shadow: 0 4px 14px rgba(201,163,91,0.3);
        }

        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>How much commission is slipping through delayed follow-ups?</h1>
        <p class="subtitle">Enter your metrics below to see what slow speed-to-lead is costing your pipeline monthly.</p>

        <div class="calculator-card">
            <div class="form-group">
                <label for="monthlyLeads">Average Monthly Inbound Leads</label>
                <input type="number" id="monthlyLeads" value="100" min="0">
            </div>

            <div class="form-group">
                <label for="avgCommission">Average Commission per Deal</label>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="number" id="avgCommission" class="has-prefix" value="5000" min="0">
                </div>
            </div>

            <div class="form-group">
                <div class="slider-header">
                    <label for="estimatedLoss">Estimated Leads Lost to Delayed Response</label>
                    <span class="slider-value" id="sliderValue">35%</span>
                </div>
                <input type="range" id="estimatedLoss" min="5" max="80" value="35">
            </div>

            <div class="results-box">
                <div class="results-title">Estimated Monthly Revenue Leakage</div>
                <div class="loss-amount" id="monthlyLossDisplay">$175,000</div>
                <div class="annual-loss">That's <span id="annualLossDisplay" style="color: var(--cream); font-weight: 600;">$2,100,000</span> slipping away every year.</div>
            </div>
        </div>

        <div class="cta-section">
            <a href="what%20we%20do.html" class="btn-primary">See How We Plug This Leak</a>
        </div>
    </div>

    <script>
        const monthlyLeadsInput = document.getElementById('monthlyLeads');
        const avgCommissionInput = document.getElementById('avgCommission');
        const estimatedLossSlider = document.getElementById('estimatedLoss');
        const sliderValueLabel = document.getElementById('sliderValue');
        
        const monthlyLossDisplay = document.getElementById('monthlyLossDisplay');
        const annualLossDisplay = document.getElementById('annualLossDisplay');

        function calculateLoss() {
            const leads = parseFloat(monthlyLeadsInput.value) || 0;
            const commission = parseFloat(avgCommissionInput.value) || 0;
            const lossPercentage = parseFloat(estimatedLossSlider.value) || 0;

            // Update visible range percentage text
            sliderValueLabel.textContent = lossPercentage + '%';

            // Calculations
            // Assumes loss percentage represents portion of total volume abandoned/failed due to lag
            const monthlyLoss = leads * (lossPercentage / 100) * commission;
            const annualLoss = monthlyLoss * 12;

            // Format numbers nicely to currency locale strings
            monthlyLossDisplay.textContent = '$' + Math.round(monthlyLoss).toLocaleString();
            annualLossDisplay.textContent = '$' + Math.round(annualLoss).toLocaleString();
        }

        // Listen for user changes to compute outputs instantly
        monthlyLeadsInput.addEventListener('input', calculateLoss);
        avgCommissionInput.addEventListener('input', calculateLoss);
        estimatedLossSlider.addEventListener('input', calculateLoss);

        // Run calculation once on page load to set initial values
        calculateLoss();
    </script>
</body>
</html>
