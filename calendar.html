<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Demo &mdash; Hermia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --card: #111111;
  --border: rgba(201,163,91,0.15);
  --gold: #C9A35B;
  --gold-light: #e8c17a;
  --cream: #f5f1e8;
  --soft: #b8b5ad;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--black); color:var(--cream); min-height:100vh; display:flex; flex-direction:column; }

nav {
  padding:20px 48px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(8,8,8,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.nav-logo img { width:34px; height:34px; }
.nav-logo span { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--cream); }

.calendar-container {
  flex:1;
  max-width:1100px;
  width:100%;
  margin:40px auto;
  padding:0 24px;
  position:relative;
}
.calendar-glow { 
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); 
  width:800px; height:600px; 
  background:radial-gradient(ellipse, rgba(201,163,91,0.12) 0%, transparent 65%); 
  pointer-events:none; filter:blur(50px); z-index:0; 
}
#cal-inline-embed {
  position:relative;
  z-index:1;
  width:100%;
  height:700px;
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--card);
  box-shadow:0 24px 64px rgba(0,0,0,0.7), 0 0 40px rgba(201,163,91,0.1);
  overflow:hidden;
}

footer {
  border-top:1px solid var(--border);
  padding:32px 48px;
  font-size:12px;
  color:#8a8580;
  text-align:center;
}

@media(max-width:640px){
  nav { padding:20px; }
  .calendar-container { margin:20px auto; }
  #cal-inline-embed { height:600px; }
}
</style>

<!-- Cal.com Embedded Script Configuration -->
<script type="text/javascript">
  (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
  
  Cal("init", "business", {origin:"https://app.cal.com"});

  // This block automatically prints the calendar inline inside the #cal-inline-embed div on load
  Cal.ns.business("inline", {
    elementOrSelector: "#cal-inline-embed",
    calLink: "hermia/business",
    config: {
      "layout":"month_view",
      "theme":"dark",
      "cssVarsPerTheme":{
        "dark":{
          "cal-brand":"#C9A35B",
          "cal-bg":"#111111",
          "cal-bg-subtle":"#161616",
          "cal-bg-emphasis":"#1a1a1a",
          "cal-border":"rgba(201,163,91,0.2)",
          "cal-border-emphasis":"rgba(201,163,91,0.4)",
          "cal-text":"#f5f1e8",
          "cal-text-emphasis":"#ffffff",
          "cal-text-subtle":"#b8b5ad"
        }
      }
    }
  });
</script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="https://raw.githubusercontent.com/capital-dot/hermia-connect/main/logo.png" alt="Hermia">
    <span>Hermia</span>
  </a>
</nav>

<div class="calendar-container">
  <div class="calendar-glow"></div>
  <!-- The live booking calendar injects right here instantly -->
  <div id="cal-inline-embed"></div>
</div>

<footer>
  <p>&copy; 2026 Hermia &middot; Powered by Make & Cal.com</p>
</footer>

</body>
</html>
