<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See How It Works &mdash; Hermia</title>
<meta name="description" content="Select a date and time to coordinate your private call and see how Hermia works.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --card: #111111;
  --border: rgba(201,163,91,0.18);
  --gold: #C9A35B;
  --gold-light: #e8c17a;
  --gold-dim: rgba(201,163,91,0.08);
  --cream: #f5f1e8;
  --muted: #8a8580;
  --soft: #b8b5ad;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--black); color:var(--cream); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }

/* Navbar Setup with Back Button */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:20px 48px; display:flex; align-items:center; justify-content:space-between;
  background:rgba(8,8,8,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.nav-logo img { width:34px; height:34px; }
.nav-logo span { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--cream); }

.nav-back-btn {
  color: var(--soft); text-decoration: none; font-size: 13px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px;
  transition: all 0.25s ease; font-family: 'DM Sans', sans-serif;
}
.nav-back-btn:hover {
  color: #fff; border-color: var(--gold); background: var(--gold-dim);
  box-shadow: 0 0 15px rgba(201,163,91,0.25); transform: translateY(-1px);
}

/* Page Wrapper */
.calendar-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:150px 24px 80px; position:relative; }
.calendar-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:1000px; height:700px; background:radial-gradient(ellipse, rgba(201,163,91,0.15) 0%, transparent 65%); pointer-events:none; filter:blur(65px); opacity:0.9; }

/* Typography & Shiny Gold Effects */
.calendar-header-text { text-align:center; margin-bottom:44px; position:relative; z-index:1; }
.calendar-header-text h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(34px, 5.5vw, 56px); font-weight:700; color:#fff; letter-spacing: -1px; }
.calendar-header-text h1 em { 
  font-style:italic; 
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(232, 193, 122, 0.65), 0 0 40px rgba(201, 163, 91, 0.4); 
}
.calendar-header-text p { font-size:16px; color:var(--soft); margin-top:14px; font-weight:300; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.6; }

/* Calendar Main Box */
.hermia-cal-box {
  position:relative; z-index:1; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px;
  max-width:820px; width:100%; box-shadow:0 32px 70px rgba(0,0,0,0.8), 0 0 50px rgba(201,163,91,0.06);
}
.cal-controls { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
.cal-controls h2 { font-family:'Cormorant Garamond',serif; font-size:28px; color:#fff; font-weight:600; }
.cal-controls h2 em { font-style:italic; color:var(--gold); text-shadow: 0 0 10px rgba(201,163,91,0.3); }
.cal-btn { background:transparent; border:1px solid var(--border); color:var(--gold); padding:10px 22px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
.cal-btn:hover { background:var(--gold-dim); border-color:var(--gold); color:#fff; box-shadow: 0 0 12px rgba(201,163,91,0.2); }

.weekdays-grid { display:grid; grid-template-columns:repeat(7, 1fr); text-align:center; margin-bottom:18px; border-bottom:1px solid rgba(201,163,91,0.1); padding-bottom:14px; }
.weekday { font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); opacity:0.95; }

.days-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:12px; }
.day-cell { 
  aspect-ratio:1.35; border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; 
  font-size:16px; font-weight:500; color:var(--soft); cursor:pointer; transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1); background:rgba(255,255,255,0.01);
}
.day-cell:hover:not(.empty) { border-color:var(--gold); background:var(--gold-dim); color:#fff; transform:translateY(-4px); box-shadow:0 12px 24px rgba(0,0,0,0.5), 0 0 20px rgba(201,163,91,0.25); }
.day-cell.empty { border:none; background:transparent; cursor:default; }
.day-cell.today { border:1.5px solid var(--gold); color:var(--gold-light); font-weight:700; background:rgba(201,163,91,0.08); box-shadow:inset 0 0 15px rgba(201,163,91,0.15), 0 0 15px rgba(201,163,91,0.2); }

/* Premium Popup Modal Form Setup */
.modal-overlay { position:fixed; inset:0; background:rgba(4,4,4,0.9); backdrop-filter:blur(15px); z-index:1000; display:none; align-items:center; justify-content:center; padding:24px; }
.modal-box {
  background:var(--card); border:1.5px solid var(--gold); border-radius:20px; padding:44px; max-width:480px; width:100%;
  box-shadow:0 32px 80px rgba(0,0,0,0.9), 0 0 60px rgba(201,163,91,0.3); text-align:center;
}
.modal-box h3 { font-family:'Cormorant Garamond',serif; font-size:36px; color:#fff; font-weight:700; margin-bottom:6px; }
.modal-box h3 em { font-style:italic; color:var(--gold-light); text-shadow: 0 0 15px rgba(232,193,122,0.4); }
.modal-box p { font-size:14px; color:var(--soft); margin-bottom:32px; font-weight:300; }

.form-group { margin-bottom:22px; text-align:left; }
.form-group label { display:block; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
.form-group input { 
  width:100%; background:var(--black); border:1px solid var(--border); border-radius:8px; padding:14px 18px; 
  color:#fff; font-family:'DM Sans',sans-serif; font-size:15px; transition:all 0.2s;
}
.form-group input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 12px rgba(201,163,91,0.2); }

/* Glowing Metallic Button UI */
.modal-actions { display:flex; gap:14px; margin-top:34px; }
.btn-submit { 
  flex:2; background:linear-gradient(135deg, #8a6820 0%, #e8c17a 50%, #a07828 100%); 
  background-size: 200% auto; color:#000; border:none; padding:16px; border-radius:8px; 
  font-weight:700; font-size:13px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; 
  transition:all 0.4s ease; 
}
.btn-submit:hover { background-position: right center; box-shadow: 0 0 30px rgba(232, 193, 122, 0.6); transform: translateY(-1px); }
.btn-cancel { flex:1; background:transparent; border:1px solid var(--border); color:var(--soft); padding:16px; border-radius:8px; font-weight:600; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.btn-cancel:hover { border-color:var(--soft); color:#fff; }

footer { border-top:1px solid var(--border); padding:32px; font-size:12px; color:var(--muted); text-align:center; }
@media(max-width:768px){ nav { padding:20px 24px; } .calendar-section { padding-top:120px; } .hermia-cal-box { padding:24px 16px; } .day-cell { aspect-ratio:1.1; font-size:14px; } .modal-box { padding:32px 20px; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="https://raw.githubusercontent.com/capital-dot/hermia-connect/main/logo.png" alt="Hermia">
    <span>Hermia</span>
  </a>
  <a href="index.html" class="nav-back-btn">Back to Site &rarr;</a>
</nav>

<div class="calendar-section">
  <div class="calendar-glow"></div>
  
  <div class="calendar-header-text">
    <h1>Select a Date to <em>See How It Works</em></h1>
    <p>Choose an available day on our custom booking window below to coordinate your private strategy call walkthrough.</p>
  </div>
  
  <div class="hermia-cal-box">
    <div class="cal-controls">
      <button class="cal-btn" onclick="moveMonth(-1)">&larr; Previous</button>
      <h2 id="month-year-display">Loading <em>Calendar</em>...</h2>
      <button class="cal-btn" onclick="moveMonth(1)">Next &rarr;</button>
    </div>
    
    <div class="weekdays-grid">
      <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
      <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div>
      <div class="weekday">Sat</div>
    </div>
    
    <div class="days-grid" id="days-container"></div>
  </div>
</div>

<div class="modal-overlay" id="booking-modal">
  <div class="modal-box">
    <h3>Secure Your <em>Private Call</em></h3>
    <p id="selected-date-string">Selected Date</p>
    
    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
      <input type="hidden" name="subject" value="🔥 NEW PRIVATE CALL BOOKED - SEE HOW IT WORKS">
      <input type="hidden" id="hidden-date-field" name="Requested Date">
      
      <input type="hidden" name="cc" value="octavora8@gmail.com, capital@hermia.au">
      <input type="hidden" name="redirect" value="https://capital-dot.github.io/hermia-website/index.html">

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="name" required placeholder="Enter full name">
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="name@agency.com">
      </div>
      
      <div class="form-group">
        <label>Target Marketplace / Region</label>
        <input type="text" name="market" required placeholder="e.g. Australia or Dubai">
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-submit">Done</button>
      </div>
    </form>
  </div>
</div>

<footer>
  <p>&copy; 2026 Hermia &middot; All Rights Reserved.</p>
</footer>

<script>
let currentDate = new Date();
const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  document.getElementById('month-year-display').innerHTML = `${monthNames[month]} <em>${year}</em>`;
  
  const firstDayIndex = new Date(year, month, 1).getDay();
  const lastDay = new Date(year, month + 1, 0).getDate();
  
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  
  for (let i = 0; i < firstDayIndex; i++) {
    const emptyCell = document.createElement('div');
    emptyCell.classList.add('day-cell', 'empty');
    container.appendChild(emptyCell);
  }
  
  const today = new Date();
  for (let day = 1; day <= lastDay; day++) {
    const dayCell = document.createElement('div');
    dayCell.classList.add('day-cell');
    dayCell.innerText = day;
    
    if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
      dayCell.classList.add('today');
    }
    
    dayCell.onclick = () => openModal(day, month, year);
    container.appendChild(dayCell);
  }
}

function moveMonth(direction) {
  currentDate.setMonth(currentDate.getMonth() + direction);
  renderCalendar();
}

function openModal(day, month, year) {
  const dateObj = new Date(year, month, day);
  const formattedString = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  document.getElementById('selected-date-string').innerText = `Selected Slot: ${formattedString}`;
  document.getElementById('hidden-date-field').value = formattedString;
  
  const modal = document.getElementById('booking-modal');
  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('booking-modal').style.display = 'none';
}

renderCalendar();
</script>

</body>
</html>
