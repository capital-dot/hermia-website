<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermia — Secure Additional Closings Every Month Without Lifting a Finger</title>
<meta name="description" content="Hermia instantly engages, qualifies, and scores every buyer enquiry in under 60 seconds via WhatsApp and SMS allowing agents to begin their day with a pipeline of ready buyers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --card: #111111;
  --border: rgba(201,163,91,0.15);
  --gold: #C9A35B;
  --gold-light: #e8c17a;
  --gold-dim: rgba(201,163,91,0.08);
  --cream: #f5f1e8;
  --muted: #8a8580;
  --soft: #b8b5ad;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--black); color:var(--cream); overflow-x:hidden; }

nav {
position:fixed; top:0; left:0; right:0; z-index:100;
padding:20px 48px;
display:flex; align-items:center; justify-content:space-between;
background:rgba(8,8,8,0.92); backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}
.nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.nav-logo img { width:34px; height:34px; }
.nav-logo span { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--cream); }
.nav-links { display:flex; align-items:center; gap:32px; list-style:none; }
.nav-links a { color:var(--soft); text-decoration:none; font-size:14px; transition:color 0.2s; }
.nav-links a:hover { color:var(--cream); }
.nav-cta {
background:var(--gold)!important;
color:#000!important;
padding:10px 24px!important;
border-radius:8px;
font-weight:600!important;
}

.hero {
min-height:100vh; display:flex; flex-direction:column;
align-items:center; justify-content:center; text-align:center;
padding:160px 24px 120px; position:relative;
}
.hero-glow {
position:absolute; top:15%; left:50%; transform:translateX(-50%);
width:1100px; height:780px;
background:radial-gradient(ellipse, rgba(201,163,91,0.28) 0%, transparent 65%);
pointer-events:none;
filter:blur(65px);
opacity: 0.9;
}
.hero-logo { width:76px; height:76px; margin-bottom:32px; filter:drop-shadow(0 0 32px rgba(201,163,91,0.4)); }
.hero-badge {
display:inline-flex; align-items:center; gap:8px;
background:var(--gold-dim); border:1px solid var(--border);
border-radius:100px; padding:6px 18px;
font-size:11px; font-weight:600; color:var(--gold);
letter-spacing:2px; text-transform:uppercase; margin-bottom:32px;
}
.hero h1 {
font-family:'Cormorant Garamond',serif;
font-size:clamp(52px,8.5vw,98px);
font-weight:700; line-height:1.02; letter-spacing:-2px;
color:#fff; max-width:980px;
text-shadow: 
  0 0 40px rgba(201,163,91,0.4),
  0 0 80px rgba(201,163,91,0.25);
}
.hero h1 em { 
  font-style:italic; 
  color:var(--gold); 
  text-shadow: 0 0 30px #e8c17a, 0 0 60px #C9A35B;
}
.hero-sub {
margin-top:32px; font-size:19px; color:var(--soft);
max-width:720px; line-height:1.6; font-weight:300;
}

.btn-primary {
background:var(--gold); color:#000;
padding:18px 36px; border-radius:12px;
font-size:16px; font-weight:600; text-decoration:none;
transition:all 0.3s; display:inline-flex; align-items:center; gap:8px;
}
.btn-primary:hover { 
  background:var(--gold-light); 
  transform:translateY(-3px); 
  box-shadow:0 12px 32px rgba(201,163,91,0.5), 0 0 40px rgba(201,163,91,0.6);
}

.stats-bar {border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:rgba(201,163,91,0.02); padding:48px 48px; display:flex; align-items:center; justify-content:center; gap:60px; flex-wrap:wrap;}
.stat { text-align:center; max-width:240px; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:700; color:var(--gold); line-height:1; }
.stat-label { font-size:13px; color:var(--soft); margin-top:10px; line-height:1.5; font-weight:400; }

section { padding:96px 24px; max-width:1100px; margin:0 auto; }
.divider { border-top:1px solid var(--border); }
.section-tag { font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); margin-bottom:18px; }
.section-title { 
  font-family:'Cormorant Garamond',serif; 
  font-size:clamp(36px,5vw,56px); 
  font-weight:700; 
  line-height:1.1; 
  color:#fff; 
  max-width:820px;
  text-shadow: 0 0 25px rgba(201,163,91,0.35);
}
.section-title em { font-style:italic; color:var(--gold); }
.section-body { font-size:18px; color:var(--soft); line-height:1.7; max-width:640px; margin-top:18px; font-weight:300; }

.video-outer {
margin: 52px auto 64px;
max-width: 860px;
position: relative;
}
.video-outer::before {
content: '';
position: absolute;
inset: -2px;
border-radius: 20px;
background: linear-gradient(135deg, rgba(201,163,91,0.65), rgba(201,163,91,0.18), rgba(201,163,91,0.55));
z-index: 0;
}
.video-outer::after {
content: '';
position: absolute;
inset: -32px;
border-radius: 32px;
background: radial-gradient(ellipse, rgba(201,163,91,0.22) 0%, transparent 70%);
z-index: -1;
filter: blur(22px);
}
.video-wrapper {
position: relative;
padding-bottom: 56.25%;
height: 0;
overflow: hidden;
border-radius: 18px;
background: #0a0a0a;
z-index: 1;
box-shadow: 0 0 0 1px rgba(201,163,91,0.3), 0 24px 64px rgba(0,0,0,0.7), 0 0 60px rgba(201,163,91,0.25);
}
.video-wrapper iframe {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
border: none;
border-radius: 18px;
}

.steps { margin-top:60px; display:flex; flex-direction:column; position:relative; }
.steps::before {
content:'';
position:absolute;
left:31px;
top:32px;
bottom:32px;
width:1px;
background:linear-gradient(180deg,var(--gold),transparent);
}
.step { display:flex; gap:32px; padding:44px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
.step:last-child { border-bottom:none; }
.step-num {
width:64px; height:64px; min-width:64px; border-radius:50%;
background:var(--black);
border:1px solid rgba(201,163,91,0.4);
display:flex; align-items:center; justify-content:center;
font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; color:var(--gold);
position:relative; z-index:1;
box-shadow: 0 0 0 5px var(--black);
}
.step-content { padding-top:14px; }
.step-content h3 { font-size:22px; font-weight:600; color:#fff; margin-bottom:8px; }
.step-content p { font-size:16px; color:var(--soft); line-height:1.65; font-weight:300; }
.step-tag { display:inline-block; margin-top:10px; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); opacity:0.7; }

.features-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px; margin-top:52px; }
.feature-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; transition:all 0.3s; }
.feature-card:hover { 
  border-color:rgba(201,163,91,0.45); 
  transform:translateY(-4px); 
  box-shadow:0 16px 40px rgba(0,0,0,0.4), 0 0 40px rgba(201,163,91,0.35);
}
.feature-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.feature-card h3 { font-size:17px; font-weight:600; color:#fff; margin-bottom:10px; }
.feature-card p { font-size:15px; color:var(--soft); line-height:1.65; font-weight:300; }

.trust-section {
  border-top: 1px solid var(--border);
  padding: 80px 24px;
  position: relative;
  overflow: hidden;
  background: rgba(201,163,91,0.02);
}
.trust-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 72px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
.make-seal-wrap { flex-shrink: 0; position: relative; }
.make-seal {
  width: 150px; height: 150px;
  background: linear-gradient(135deg, #C9A35B 0%, #e8c17a 50%, #C9A35B 100%);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 6px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 0 14px rgba(201,163,91,0.07),
    0 24px 60px rgba(201,163,91,0.55),
    inset 0 2px 4px rgba(255,255,255,0.25);
  animation: seal-pulse 3s ease-in-out infinite;
}
@keyframes seal-pulse {
  0%, 100% { box-shadow: 0 0 0 14px rgba(201,163,91,0.07), 0 24px 60px rgba(201,163,91,0.55), inset 0 2px 4px rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 0 26px rgba(201,163,91,0.18), 0 34px 80px rgba(201,163,91,0.65), inset 0 2px 4px rgba(255,255,255,0.25); }
}
.make-seal-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; font-weight: 700;
  color: #111; letter-spacing: -1px; line-height: 1;
}
.make-seal-sub {
  font-size: 9px; font-weight: 700;
  color: #111; letter-spacing: 2.5px;
  text-transform: uppercase; margin-top: 6px;
}
.make-seal-verified {
  position: absolute;
  bottom: -4px; right: -4px;
  width: 36px; height: 36px;
  background: #111;
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--gold);
}
.trust-copy { max-width: 500px; }
.trust-copy-tag {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 14px;
}
.trust-copy h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 700;
  color: #fff; line-height: 1.15; margin-bottom: 16px;
}
.trust-copy h3 em { font-style: italic; color: var(--gold); }
.trust-copy p {
  font-size: 16px; color: var(--soft);
  line-height: 1.7; font-weight: 300; margin-bottom: 28px;
}
.trust-checks { display: flex; flex-direction: column; gap: 12px; }
.trust-check {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 14px; color: var(--soft); line-height: 1.5;
}
.trust-check-icon {
  width: 22px; height: 22px; min-width: 22px;
  background: rgba(201,163,91,0.12);
  border: 1px solid rgba(201,163,91,0.35);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--gold); margin-top: 1px;
}
.trust-check strong { color: #fff; }
.trust-logos-row {
  max-width: 1100px;
  margin: 40px auto 0;
  display: flex; align-items: center;
  justify-content: center; gap: 16px;
  flex-wrap: wrap;
  padding-top: 32px;
  border-top: 1px solid var(--border);
  position: relative; z-index: 1;
}
.trust-logos-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; color: var(--muted);
  text-transform: uppercase; white-space: nowrap;
  margin-right: 8px;
}
.trust-logo-pill {
  background: rgba(201,163,91,0.07);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 22px;
  font-size: 13px; font-weight: 600;
  color: var(--soft);
}

.why-section {
  border-top: 1px solid var(--border);
  padding: 96px 24px;
  max-width: 1100px;
  margin: 0 auto;
  text-align: center;
}
.why-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-top: 56px;
}
.why-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  text-align: left;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.why-card:hover {
  border-color: rgba(201,163,91,0.45);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 40px rgba(201,163,91,0.35);
}
.why-icon {
  width: 44px; height: 44px;
  background: var(--gold-dim);
  border: 1px solid rgba(201,163,91,0.35);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--gold);
  margin-bottom: 18px;
}
.why-card h3 {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 10px;
}
.why-card p {
  font-size: 14px;
  color: var(--soft);
  line-height: 1.6;
  font-weight: 300;
}

/* ── LUXURY PRICING SECTION ── */
#pricing {
  border-top: 1px solid var(--border);
  padding: 100px 24px 120px;
  text-align: center;
  position: relative;
  overflow: hidden;
  max-width: 100%;
  margin: 0;
}

/* Ambient radial glow */
#pricing .pricing-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 900px; height: 560px;
  background: radial-gradient(ellipse, rgba(201,163,91,0.08) 0%, transparent 68%);
  pointer-events: none;
  filter: blur(10px);
}

/* Diamond-flanked section tag */
.pricing-tag-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 44px;
}
.pricing-tag-line {
  height: 1px;
  width: 56px;
  background: linear-gradient(90deg, transparent, rgba(201,163,91,0.5));
}
.pricing-tag-line.r {
  background: linear-gradient(90deg, rgba(201,163,91,0.5), transparent);
}
.pricing-tag-diamond {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: .65;
}
.pricing-tag-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
}

/* Heading */
#pricing .pricing-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 4.5vw, 3.2rem);
  font-weight: 700;
  line-height: 1.18;
  color: #fff;
  max-width: 640px;
  margin: 0 auto 16px;
  text-shadow: 0 0 25px rgba(201,163,91,0.3);
}
#pricing .pricing-heading em {
  font-style: italic;
  color: var(--gold);
}
#pricing .pricing-sub {
  font-size: 16px;
  color: var(--soft);
  max-width: 560px;
  margin: 0 auto 72px;
  line-height: 1.65;
  font-weight: 300;
}

/* Joined panel */
.pricing-panel {
  display: flex;
  justify-content: center;
  align-items: stretch;
  max-width: 780px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Shared card */
.p-card {
  flex: 1;
  min-width: 0;
  padding: 52px 44px 48px;
  text-align: center;
  position: relative;
  background: var(--card);
  transition: background .35s ease;
}

.p-card:first-child {
  border-radius: 20px 0 0 20px;
  border: 1px solid rgba(201,163,91,0.22);
  border-right: none;
}
.p-card:last-child {
  border-radius: 0 20px 20px 0;
  border: 1.5px solid var(--gold);
  background: linear-gradient(150deg, #131008 0%, #111111 55%);
}
.p-card:first-child:hover { background: #131313; }
.p-card:last-child:hover  { background: linear-gradient(150deg, #171209 0%, #131313 55%); }

/* Corner marks on featured card only */
.p-card:last-child::before,
.p-card:last-child::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--gold);
  border-style: solid;
}
.p-card:last-child::before { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
.p-card:last-child::after  { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }

/* Vertical divider */
.p-divider {
  width: 1px;
  background: linear-gradient(180deg, transparent 5%, rgba(201,163,91,0.3) 30%, rgba(201,163,91,0.3) 70%, transparent 95%);
  flex-shrink: 0;
}

/* Featured badge */
.p-badge {
  position: absolute;
  top: -1px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(90deg, #8a6820, #e8c17a, #8a6820);
  color: #000;
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 3px;
  padding: 5px 20px;
  text-transform: uppercase;
  border-radius: 0 0 10px 10px;
  white-space: nowrap;
}

/* Country label */
.p-country {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.p-flag { font-size: 20px; }

/* Gold rule */
.p-rule {
  width: 28px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 32px;
}

/* Price */
.p-price-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 3px;
  margin-bottom: 6px;
}
.p-currency {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 300;
  color: rgba(245,241,232,0.45);
  margin-top: 14px;
}
.p-amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 84px;
  font-weight: 700;
  line-height: 1;
  color: #fff;
  letter-spacing: -.03em;
}
.p-card:last-child .p-amount { color: var(--gold-light); }

.p-per {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 32px;
}

/* Setup fee */
.p-was {
  font-size: 11px;
  color: rgba(138,133,128,0.45);
  text-decoration: line-through;
  margin-bottom: 7px;
  letter-spacing: .3px;
}
.p-offer {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 40px;
}

/* Feature list */
.p-features {
  list-style: none;
  text-align: left;
  margin-bottom: 40px;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.p-features li {
  font-size: 13px;
  color: var(--soft);
  font-weight: 300;
  line-height: 1.5;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.p-features li::before {
  content: '◆';
  font-size: 6px;
  color: var(--gold);
  opacity: .7;
  margin-top: 5px;
  flex-shrink: 0;
}

/* Buttons */
.p-btn {
  display: block;
  width: 100%;
  padding: 16px 20px;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all .3s ease;
}
.p-btn-outline {
  background: transparent;
  border: 1px solid rgba(201,163,91,0.38);
  color: var(--gold);
}
.p-btn-outline:hover {
  background: rgba(201,163,91,0.06);
  border-color: var(--gold);
}
.p-btn-gold {
  background: linear-gradient(90deg, #8a6820, #e8c17a, #a07828);
  border: none;
  color: #000;
  box-shadow: 0 6px 28px rgba(201,163,91,0.28);
}
.p-btn-gold:hover {
  filter: brightness(1.08);
  box-shadow: 0 10px 36px rgba(201,163,91,0.42);
}

/* Footnote */
.pricing-footnote {
  margin-top: 56px;
  font-size: 9px;
  letter-spacing: 2.5px;
  color: rgba(138,133,128,0.4);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.pf-diamond {
  width: 4px; height: 4px;
  background: rgba(201,163,91,0.4);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* Pricing mobile */
@media (max-width: 680px) {
  #pricing { padding: 80px 20px 100px; }
  .pricing-panel {
    flex-direction: column;
    max-width: 340px;
    gap: 16px;
  }
  .p-divider { display: none; }
  .p-card:first-child {
    border-radius: 16px;
    border: 1px solid rgba(201,163,91,0.22);
  }
  .p-card:last-child { border-radius: 16px; }
  .p-amount { font-size: 68px; }
  .p-card { padding: 44px 28px 40px; }
}

/* ── END PRICING ── */

.cta-section { text-align:center; padding:100px 24px; max-width:800px; margin:0 auto; }
.cta-actions { display:flex; align-items:center; gap:14px; justify-content:center; margin-top:44px; flex-wrap:wrap; }

.btn-secondary {
  background: transparent;
  color: #fff;
  border: 2px solid var(--gold);
  padding: 18px 36px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-secondary:hover {
  background: var(--gold-light);
  color: #000;
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(201,163,91,0.5), 0 0 40px rgba(201,163,91,0.6);
}

footer {
border-top:1px solid var(--border);
padding:48px; display:grid;
grid-template-columns:1.2fr 1fr 1fr 1fr; gap:40px;
}
.footer-logo { display:flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:16px; }
.footer-logo img { width:28px; height:28px; }
.footer-logo span { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--cream); }
.footer-meta { font-size:13px; color:var(--muted); line-height:1.9; }
.footer-col h4 { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
