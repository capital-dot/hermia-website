<head>

<title>Hermia — The Lead Profit Center</title>

<style>
:root {
  --black: #080808;
  --card: #111111;
  --border: rgba(201,163,91,0.15);
  --gold: #C9A35B;
  --gold-light: #e8c17a;
  --gold-dim: rgba(201,163,91,0.06);
  --cream: #f5f1e8;
  --muted: #8a8580;
  --soft: #b8b5ad;
  --emerald: #10b981;
  --ruby: #f43f5e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--black);
  color:var(--cream);
  min-height:100vh;
  padding:0;
}

/* Navigation Controls */
.nav-controls {
  position: sticky; top: 0;
  background: rgba(8,8,8,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 100;
}
.nav-left { display: flex; gap: 12px; }
.nav-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--soft); text-decoration: none; font-size: 11px;
  font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  padding: 10px 16px; border-radius: 8px; transition: 0.3s;
}
.nav-btn:hover { border-color: var(--gold); color: #fff; }
.live-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gold); font-weight: 500; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }

.shell { max-width: 1000px; margin: 0 auto; padding: 60px 24px; }

/* Marketing Hook */
.marketing-header { text-align: center; margin-bottom: 60px; }
.marketing-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(40px, 7vw, 72px); font-weight: 700;
  line-height: 1.1; color: #fff; margin-bottom: 24px;
}
.marketing-header h1 em { font-style: italic; color: var(--gold); }
.marketing-header p {
  font-size: 18px; color: var(--soft); max-width: 600px; margin: 0 auto;
  line-height: 1.6; font-weight: 300;
}

/* SECURITY & DASHBOARD FEED VIDEO */
.security-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 32px; padding: 48px; margin-bottom: 80px;
}
.security-section h3 { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: #fff; margin-bottom: 12px; text-align: center; }
