<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermia | Connection Successful</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,100;9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #080705;
            --bg-card: rgba(10, 9, 7, 0.85);
            --gold: #D4AF37;
            --gold-light: #F9E2AF;
            --gold-muted: rgba(212, 175, 55, 0.12);
            --cream: #f4f0e6;
            --soft: #a19d94;
            --border: rgba(212, 175, 55, 0.2);
            --ease-cinematic: cubic-bezier(0.19, 1, 0.22, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: 'DM Sans', sans-serif; overflow: hidden; }
        
        .bg-layers { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .vignette { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,1) 100%); z-index: 5; }
        .light-bloom { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 65%); }
        .grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 120px 120px; -webkit-mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 85%); mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 85%); opacity: 0.15; }

        .wrap { position: relative; z-index: 10; width: 100%; max-width: 600px; margin: 0 auto; padding: 80px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .card {
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 60px 50px;
            text-align: center;
            position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.6; }

        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            display: grid;
            place-items: center;
            margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        .success-icon svg { width: 28px; height: 28px; stroke: var(--gold); stroke-width: 2.5; fill: none; }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; line-height: 1.05; margin-bottom: 20px; letter-spacing: -0.02em; }
        .sub { font-size: 16px; color: var(--soft); margin-bottom: 40px; line-height: 1.7; font-weight: 300; }

        .loading-dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; opacity: 0.3; animation: dot-pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="bg-layers">
        <div class="light-bloom"></div>
        <div class="grid"></div>
        <div class="vignette"></div>
    </div>

    <div class="wrap">
        <div class="card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h1>Connection Successful</h1>
            <p class="sub" id="statusText">Your channel has been connected. We're finalizing your setup...</p>
            
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('customerId') || sessionStorage.getItem('hermia_customer_id');
        const provider = urlParams.get('provider');

        // Mark as connected in session
        if (provider === 'instagram') sessionStorage.setItem('hermia_ig_connected', 'true');
        if (provider === 'facebook') sessionStorage.setItem('hermia_fb_connected', 'true');

        async function routeToSetup() {
            if (!customerId) {
                document.getElementById('statusText').textContent = "Session error. Please restart from your email.";
                return;
            }

            try {
                // Fetch CRM provider from worker to decide where to go next
                const res = await fetch(`https://hermianango.capital-fbc.workers.dev/get-contractor-state?customerId=${customerId}`);
                const data = await res.json();
                
                // Authoritative routing
                let nextPage = 'hermia_setup.html'; // Default Simpro
                if (data.crm_provider === 'servicem8') {
                    nextPage = 'servicem8_setup.html';
                }

                // Small delay for visual confirmation
                setTimeout(() => {
                    window.location.href = `${nextPage}?customerId=${customerId}`;
                }, 2000);

            } catch (e) {
                console.error("Routing error:", e);
                // Fallback to default setup page
                window.location.href = `hermia_setup.html?customerId=${customerId}`;
            }
        }

        routeToSetup();
    </script>
</body>
</html>
