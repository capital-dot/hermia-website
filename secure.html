<!-- ULTRA-COMPACT AMBIENT ACTIVITY TICKER -->
<div id="hermia-micro-ticker">
  <div class="micro-pulse-wrapper">
    <span class="micro-dot"></span>
  </div>
  <div class="micro-content">
    <div id="ticker-label">PIPELINE STATUS</div>
    <div id="ticker-value">Lead Qualification Active</div>
  </div>
</div>

<style>
#hermia-micro-ticker {
  position: fixed;
  bottom: 15px; /* Tucked low to avoid hitting page tags */
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #0a0a0a;
  border: 1px solid rgba(201, 163, 91, 0.35);
  border-radius: 6px;
  padding: 6px 14px;
  height: 38px; /* Massive size reduction from 64px */
  box-sizing: border-box;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
  z-index: 999999;
  font-family: 'DM Sans', sans-serif;
  pointer-events: none; /* Allows users to click text behind it if needed */
}

/* MINI GREEN STATUS DOT */
.micro-pulse-wrapper { display: flex; align-items: center; justify-content: center; }
.micro-dot {
  width: 6px; height: 6px; background: #10b981; border-radius: 50%;
  box-shadow: 0 0 8px #10b981; position: relative;
}
.micro-dot::after {
  content: ''; position: absolute; width: 100%; height: 100%;
  top: 0; left: 0; border-radius: 50%; border: 1px solid #10b981;
  animation: microPulse 2s infinite ease-out; opacity: 0.6;
}
@keyframes microPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(3); opacity: 0; } }

/* COMPACT TEXT TRACKS */
.micro-content { display: flex; flex-direction: column; justify-content: center; }
#ticker-label {
  font-size: 8px; font-weight: 700; color: #666;
  text-transform: uppercase; letter-spacing: 1px; margin: 0;
  line-height: 1; transition: opacity 0.25s ease;
}
#ticker-value {
  font-size: 11px; font-weight: 500; color: #f5f1e8; margin: 1px 0 0 0;
  line-height: 1.1; white-space: nowrap; transition: opacity 0.25s ease;
}

/* ANIMATION TRANSITION CLASS */
.micro-fade { opacity: 0; }
</style>

<script>
// THE LUXURY STATUS LOGS
const networkEvents = [
  { label: "PIPELINE STATUS", value: "Lead Qualification Active" },
  { label: "CRM CONNECTION", value: "Dashboard Sync Stable" },
  { label: "RESPONSE MONITORING", value: "Inbound Activity Processing" },
  { label: "AI ASSISTANCE", value: "Priority Sorting Enabled" },
  { label: "SYSTEM STATUS", value: "Operational Systems Online" },
  { label: "PIPELINE FLOW", value: "Real-Time Routing Active" }
];

let eventIndex = 0;
const labelEl = document.getElementById('ticker-label');
const valueEl = document.getElementById('ticker-value');

function cycleNetworkMetrics() {
  labelEl.classList.add('micro-fade');
  valueEl.classList.add('micro-fade');
  
  setTimeout(() => {
    eventIndex = (eventIndex + 1) % networkEvents.length;
    labelEl.textContent = networkEvents[eventIndex].label;
    valueEl.textContent = networkEvents[eventIndex].value;
    
    labelEl.classList.remove('micro-fade');
    valueEl.classList.remove('micro-fade');
  }, 250);
}

// Cycles smoothly every 4.5 seconds
setInterval(cycleNetworkMetrics, 4500);
</script>



<script src="/hermia-widget.js"></script>
