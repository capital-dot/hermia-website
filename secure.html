<!-- THE SECURE GOLDEN HOUSE AI WIDGET -->
<div id="hermia-secure-widget">
  
  <!-- FLOATING GOLDEN HOUSE TRIGGER -->
  <button id="secure-trigger" onclick="toggleSecureChat()">
    <svg class="house-icon" viewBox="0 0 24 24" width="26" height="26" stroke="#C9A35B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
    <span class="pulse-ring"></span>
  </button>

  <!-- LUXURY AI INTERFACE WINDOW -->
  <div id="secure-window">
    <!-- HEADER -->
    <div class="secure-header">
      <div class="header-meta">
        <div class="live-indicator"></div>
        <div>
          <h4>Hermia Core Intelligence</h4>
          <p>Lead Infrastructure & Optimization</p>
        </div>
      </div>
      <button class="close-widget" onclick="toggleSecureChat()">✕</button>
    </div>

    <!-- CHAT CONVERSATION FRAME -->
    <div class="secure-messages" id="secure-scroller">
      <div class="secure-msg bot">
        <div class="secure-bubble">
          Welcome to Hermia. I am our core dynamic routing intelligence. Skip the reading—ask me any questions about backend lead interception, setups, or CRM integrations.
          
          <div class="smart-chips">
            <button class="chip" onclick="askManusAI('How do I prioritize leads?')">How do I prioritize leads?</button>
            <button class="chip" onclick="askManusAI('Show me top prospects')">Show me top prospects</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ENTRY FOOTER LAYER -->
    <div class="secure-footer">
      <div class="secure-input-wrapper">
        <input type="text" id="secure-input" placeholder="Ask a question..." onkeypress="handleSecureKey(event)">
        <button class="secure-send-btn" onclick="processSecureInput()">Send</button>
      </div>
    </div>

  </div>
</div>

<style>
#hermia-secure-widget { position: fixed; bottom: 30px; right: 30px; z-index: 999999; font-family: 'DM Sans', sans-serif; color: #f5f1e8; }
#secure-trigger { width: 64px; height: 64px; border-radius: 50%; background: #0c0c0c; border: 2px solid #C9A35B; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(201,163,91,0.25); position: relative; transition: transform 0.3s ease; }
#secure-trigger:hover { transform: scale(1.08); background: #121212; }
.pulse-ring { position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 50%; border: 2px solid #C9A35B; animation: ringGlow 2.5s infinite; pointer-events: none; }
@keyframes ringGlow { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
#secure-window { position: absolute; bottom: 80px; right: 0; width: 390px; height: 540px; background: #0c0c0c; border: 1px solid rgba(201,163,91,0.2); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
#secure-window.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
.secure-header { padding: 18px 20px; background: #050505; border-bottom: 1px solid rgba(201,163,91,0.15); display: flex; align-items: center; justify-content: space-between; }
.header-meta { display: flex; align-items: center; gap: 10px; }
.live-indicator { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
.secure-header h4 { font-size: 14px; font-weight: 600; color: #fff; margin: 0; }
.secure-header p { font-size: 11px; color: #666; margin: 0; }
.close-widget { background: transparent; border: none; color: #666; cursor: pointer; font-size: 14px; }
.secure-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: rgba(5,5,5,0.4); }
.secure-msg { display: flex; width: 100%; }
.secure-msg.bot { justify-content: flex-start; }
.secure-msg.user { justify-content: flex-end; }
.secure-bubble { max-width: 88%; padding: 14px 18px; border-radius: 14px; font-size: 13.5px; line-height: 1.6; }
.bot .secure-bubble { background: #121212; border: 1px solid rgba(201,163,91,0.1); color: #f5f1e8; border-top-left-radius: 4px; }
.user .secure-bubble { background: rgba(201,163,91,0.06); border: 1px solid rgba(201,163,91,0.25); color: #fff; border-top-right-radius: 4px; }
.smart-chips { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.chip { background: #050505; border: 1px solid rgba(201,163,91,0.15); color: #C9A35B; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; text-align: left; cursor: pointer; transition: all 0.2s; }
.chip:hover { border-color: #C9A35B; background: rgba(201,163,91,0.08); color: #e8c17a; }
.secure-footer { padding: 16px; background: #050505; border-top: 1px solid rgba(201,163,91,0.1); }
.secure-input-wrapper { display: flex; background: #0d0d0d; border: 1px solid rgba(201,163,91,0.15); border-radius: 10px; padding: 4px; align-items: center; }
.secure-input-wrapper input { flex: 1; background: transparent; border: none; padding: 10px 12px; color: #fff; font-size: 13.5px; }
.secure-input-wrapper input:focus { outline: none; }
.secure-send-btn { background: #C9A35B; color: #000; border: none; padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; }
.ai-typing { display: flex; gap: 5px; align-items: center; padding: 6px 10px !important; }
.t-dot { width: 5px; height: 5px; background: #C9A35B; border-radius: 50%; opacity: 0.4; animation: pulseWave 1.3s infinite; }
.t-dot:nth-child(2) { animation-delay: 0.15s; }
.t-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes pulseWave { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
@media(max-width: 480px) { #secure-window { width: calc(100vw - 40px); height: 460px; bottom: 75px; right: -10px; } }
</style>

<!-- REAL AI BACKEND COUPLING SCRIPT -->
<script>
function toggleSecureChat() {
  document.getElementById('secure-window').classList.toggle('active');
}

function handleSecureKey(e) {
  if (e.key === 'Enter') processSecureInput();
}

function appendSecureMsg(text, side, isIndicator = false) {
  const scroller = document.getElementById('secure-scroller');
  const wrapper = document.createElement('div');
  wrapper.className = `secure-msg ${side}`;
  if(isIndicator) wrapper.id = 'ai-typing-indicator';
  
  const bubble = document.createElement('div');
  bubble.className = 'secure-bubble';
  bubble.innerHTML = text;
  
  wrapper.appendChild(bubble);
  scroller.appendChild(wrapper);
  scroller.scrollTop = scroller.scrollHeight;
}

function showSecureTyping() {
  appendSecureMsg(`<div class="ai-typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`, 'bot', true);
}

function removeSecureTyping() {
  const indicator = document.getElementById('ai-typing-indicator');
  if (indicator) indicator.remove();
}

// THIS FUNCTION COMMUNICATES DIRECTLY WITH MANUS'S LLM BACKEND
async function messageBrainAPI(userText) {
  showSecureTyping();
  
  try {
    // We make a real live fetch request to the server endpoint Manus generated
    // NOTE: If Manus used tRPC, this URL path might look like '/api/trpc/chat.sendMessage'
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText })
    });
    
    const data = await response.json();
    removeSecureTyping();
    
    // Grabs the real intelligent response back from the LLM
    const aiReply = data.reply || data.content || "Connection established. Core system parameters are operational.";
    appendSecureMsg(aiReply, 'bot');
    
  } catch (error) {
    removeSecureTyping();
    // Elegant system fallback response if the server is restarting
    appendSecureMsg("System pipeline communication handshake paused. Please try your technical query again in a moment.", 'bot');
  }
}

function askManusAI(question) {
  appendSecureMsg(question, 'user');
  messageBrainAPI(question);
}

function processSecureInput() {
  const inputEl = document.getElementById('secure-input');
  const queryText = inputEl.value.trim();
  if(!queryText) return;
  
  appendSecureMsg(queryText, 'user');
  inputEl.value = '';
  
  // Sends your query straight to the dynamic AI backend
  messageBrainAPI(queryText);
}
</script>
