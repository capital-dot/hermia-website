<!-- SYSTEM TELEMETRY NODE (ENTERPRISE RESTRAINT EDITION) -->
<div id="hermia-left-node">
  
  <!-- FLOATING TRIGGER (FAR LEFT) -->
  <button id="node-trigger" onclick="toggleSecureChat()">
    <svg class="house-icon" viewBox="0 0 24 24" width="24" height="24" stroke="#C9A35B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
      <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
    <span class="pulse-ring"></span>
  </button>

  <!-- AMBIENT INFRASTRUCTURE CAPSULE (EXTENDS RIGHT) -->
  <div id="fomo-capsule">
    <div class="live-pulse-container">
      <span class="glowing-dot"></span>
    </div>
    <div class="ticker-content">
      <p class="ticker-label" id="ticker-label">PIPELINE STATUS</p>
      <h5 class="ticker-value" id="ticker-value">Lead Qualification Active</h5>
    </div>
  </div>

  <!-- LUXURY AI INTERFACE WINDOW (LEFT ALIGNED) -->
  <div id="secure-window">
    <div class="secure-header">
      <div class="header-meta">
        <div class="live-indicator"></div>
        <div>
          <h4>Hermia Core Intelligence</h4>
          <p>Lead Infrastructure & Optimization</p>
        </div>
      </div>
      <button class="close-widget" onclick="toggleSecureChat()">✕</button>
    </div>

    <div class="secure-messages" id="secure-scroller">
      <div class="secure-msg bot">
        <div class="secure-bubble">
          Welcome back to the Hermia Node. System operational parameters are clear. Ask me anything regarding backend lead interception, CRM architecture syncing, or active routing protocols.
        </div>
      </div>
    </div>

    <div class="secure-footer">
      <div class="secure-input-wrapper">
        <input type="text" id="secure-input" placeholder="Ask a question..." onkeypress="handleSecureKey(event)">
        <button class="secure-send-btn" onclick="processSecureInput()">Send</button>
      </div>
    </div>
  </div>

</div>

<style>
#hermia-left-node {
  position: fixed; bottom: 30px; left: 30px; right: auto;
  display: flex; align-items: center; gap: 0; z-index: 999999;
  font-family: 'DM Sans', sans-serif;
}

#node-trigger {
  width: 64px; height: 64px; border-radius: 50%;
  background: #0c0c0c; border: 2px solid #C9A35B; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 30px rgba(201,163,91,0.2);
  z-index: 3; box-sizing: border-box; transition: transform 0.2s ease;
  position: relative;
}
#node-trigger:hover { transform: scale(1.04); }

.pulse-ring {
  position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 50%;
  border: 2px solid #C9A35B; animation: ringGlow 2.5s infinite; pointer-events: none;
}
@keyframes ringGlow { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }

#fomo-capsule {
  background: rgba(12, 12, 12, 0.95); border: 1px solid #C9A35B; border-left: none;
  border-radius: 0 30px 30px 0; padding: 12px 20px 12px 24px;
  display: flex; align-items: center; gap: 14px; height: 64px; box-sizing: border-box;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.5); transform: translateX(-15px); z-index: 1;
}

.live-pulse-container { position: relative; display: flex; align-items: center; }
.glowing-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 12px #10b981; }
.glowing-dot::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; border: 2px solid #10b981; animation: dotPulse 2s infinite ease-out; opacity: 0.8; }
@keyframes dotPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

.ticker-content { display: flex; flex-direction: column; justify-content: center; min-width: 210px; }
.ticker-label { font-size: 9px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 2px 0; transition: opacity 0.3s ease; }
.ticker-value { font-size: 13px; font-weight: 500; color: #f5f1e8; margin: 0; transition: opacity 0.3s ease; white-space: nowrap; letter-spacing: 0.2px; }

#secure-window {
  position: absolute; bottom: 80px; left: 0; right: auto;
  width: 390px; height: 540px; background: #0c0c0c;
  border: 1px solid rgba(201,163,91,0.2); border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  display: flex; flex-direction: column; overflow: hidden;
  opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none;
  transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 4;
}
#secure-window.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

.secure-header { padding: 18px 20px; background: #050505; border-bottom: 1px solid rgba(201,163,91,0.15); display: flex; align-items: center; justify-content: space-between; }
.header-meta { display: flex; align-items: center; gap: 10px; }
.live-indicator { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
.secure-header h4 { font-size: 14px; font-weight: 600; color: #fff; margin: 0; }
.secure-header p { font-size: 11px; color: #666; margin: 0; }
.close-widget { background: transparent; border: none; color: #666; cursor: pointer; font-size: 14px; }
.secure-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: rgba(5,5,5,0.4); }
.secure-msg { display: flex; width: 100%; }
.secure-msg.bot { justify-content: flex-start; }
.secure-msg.user { justify-content: flex-end; }
.secure-bubble { max-width: 88%; padding: 14px 18px; border-radius: 14px; font-size: 13.5px; line-height: 1.6; }
.bot .secure-bubble { background: #121212; border: 1px solid rgba(201,163,91,0.1); color: #f5f1e8; border-top-left-radius: 4px; }
.user .secure-bubble { background: rgba(201,163,91,0.06); border: 1px solid rgba(201,163,91,0.25); color: #fff; border-top-right-radius: 4px; }
.secure-footer { padding: 16px; background: #050505; border-top: 1px solid rgba(201,163,91,0.1); }
.secure-input-wrapper { display: flex; background: #0d0d0d; border: 1px solid rgba(201,163,91,0.15); border-radius: 10px; padding: 4px; align-items: center; }
.secure-input-wrapper input { flex: 1; background: transparent; border: none; padding: 10px 12px; color: #fff; font-size: 13.5px; }
.secure-input-wrapper input:focus { outline: none; }
.secure-send-btn { background: #C9A35B; color: #000; border: none; padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; }
.fade-out { opacity: 0; transition: opacity 0.3s ease; }

@media(max-width: 480px) { 
  #secure-window { width: calc(100vw - 40px); height: 460px; bottom: 75px; left: -10px; } 
  #hermia-left-node { left: 15px; bottom: 15px; }
}
</style>

<script>
function toggleSecureChat() { document.getElementById('secure-window').classList.toggle('active'); }
function handleSecureKey(e) { if (e.key === 'Enter') processSecureInput(); }

function appendSecureMsg(text, side) {
  const scroller = document.getElementById('secure-scroller');
  const wrapper = document.createElement('div'); wrapper.className = `secure-msg ${side}`;
  const bubble = document.createElement('div'); bubble.className = 'secure-bubble'; bubble.innerHTML = text;
  wrapper.appendChild(bubble); scroller.appendChild(wrapper); scroller.scrollTop = scroller.scrollHeight;
}

async function messageBrainAPI(userText) {
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText })
    });
    const data = await response.json();
    appendSecureMsg(data.reply || data.content || "Handshake finalized.", 'bot');
  } catch (error) {
    appendSecureMsg("System processing data queue. Standby.", 'bot');
  }
}

function processSecureInput() {
  const inputEl = document.getElementById('secure-input'); const queryText = inputEl.value.trim();
  if(!queryText) return; appendSecureMsg(queryText, 'user'); inputEl.value = ''; messageBrainAPI(queryText);
}

// PREMIUM EXTRA-CALM ENTERPRISE METRICS ARRAY
const networkEvents = [
  { label: "PIPELINE STATUS", value: "Lead Qualification Active" },
  { label: "CRM CONNECTION", value: "Dashboard Sync Stable" },
  { label: "RESPONSE MONITORING", value: "Inbound Activity Processing" },
  { label: "AI ASSISTANCE", value: "Priority Sorting Enabled" },
  { label: "SYSTEM STATUS", value: "Operational Systems Online" },
  { label: "PIPELINE FLOW", value: "Real-Time Routing Active" }
];

let eventIndex = 0;
const labelEl = document.getElementById('ticker-label');
const valueEl = document.getElementById('ticker-value');

function cycleNetworkMetrics() {
  labelEl.classList.add('fade-out'); valueEl.classList.add('fade-out');
  setTimeout(() => {
    eventIndex = (eventIndex + 1) % networkEvents.length;
    labelEl.textContent = networkEvents[eventIndex].label;
    valueEl.textContent = networkEvents[eventIndex].value;
    labelEl.classList.remove('fade-out'); valueEl.classList.remove('fade-out');
  }, 300);
}
setInterval(cycleNetworkMetrics, 5000); // 5-second professional pacing
</script>


<script src="/hermia-widget.js"></script>
