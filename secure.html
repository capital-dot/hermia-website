<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif; background: #0c0c0c; color: #f5f1e8;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .chat-header {
    padding: 16px 20px; background: #050505; border-bottom: 1px solid rgba(201,163,91,0.15);
    display: flex; align-items: center; gap: 10px;
  }
  .header-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
  .chat-header h4 { font-size: 14px; font-weight: 600; color: #fff; }
  .chat-header p { font-size: 11px; color: #777; }
  
  .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: rgba(5,5,5,0.4); }
  .msg { display: flex; width: 100%; }
  .msg.bot { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .bot .bubble { background: #121212; border: 1px solid rgba(201,163,91,0.1); color: #f5f1e8; border-top-left-radius: 4px; }
  .user .bubble { background: rgba(201,163,91,0.08); border: 1px solid rgba(201,163,91,0.25); color: #fff; border-top-right-radius: 4px; }

  .chips { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .chip {
    background: #050505; border: 1px solid rgba(201,163,91,0.2); color: #C9A35B;
    padding: 8px 12px; border-radius: 8px; font-size: 12px; text-align: left; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { border-color: #C9A35B; background: rgba(201,163,91,0.06); color: #e8c17a; }

  .chat-footer { padding: 16px; background: #050505; border-top: 1px solid rgba(201,163,91,0.1); }
  .input-wrap { display: flex; background: #0d0d0d; border: 1px solid rgba(201,163,91,0.15); border-radius: 10px; padding: 4px; align-items: center; }
  .input-wrap input { flex: 1; background: transparent; border: none; padding: 10px 12px; color: #fff; font-size: 13px; }
  .input-wrap input:focus { outline: none; }
  .send-btn { background: #C9A35B; color: #000; border: none; padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; }
  
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 12px !important; }
  .dot { width: 5px; height: 5px; background: #C9A35B; border-radius: 50%; opacity: 0.4; animation: wWave 1.3s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes wWave { 0%, 100__ { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 1; } }
</style>
</head>
<body>

  <div class="chat-header">
    <div class="header-dot"></div>
    <div>
      <h4>Hermia Core Node</h4>
      <p>Instant Infrastructure QA</p>
    </div>
  </div>

  <div class="chat-messages" id="scroller">
    <div class="msg bot">
      <div class="bubble">
        Welcome to Hermia. Skip the reading—ask me any technical questions about our lead conversion infrastructure here.
        <div class="chips">
          <button class="chip" onclick="askPreset('Is this just another website chatbot?')">Is this just a website bot?</button>
          <button class="chip" onclick="askPreset('Does the AI hallucinate info?')">Does the AI hallucinate?</button>
          <button class="chip" onclick="askPreset('How long does it take to set up?')">How long to set up?</button>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-footer">
    <div class="input-wrap">
      <input type="text" id="chat-input" placeholder="Ask about templates, setup, or CRMs..." onkeypress="handleKey(event)">
      <button class="send-btn" onclick="processInput()">Send</button>
    </div>
  </div>

<script>
const scr = document.getElementById('scroller');
const inp = document.getElementById('chat-input');

function handleKey(e) { if (e.key === 'Enter') processInput(); }

function append(text, side, isInd = false) {
  const w = document.createElement('div'); w.className = `msg ${side}`; if(isInd) w.id = 'ind';
  const b = document.createElement('div'); b.className = 'bubble'; b.innerHTML = text;
  w.appendChild(b); scr.appendChild(w); scr.scrollTop = scr.scrollHeight;
}

function askPreset(q) {
  append(q, 'user');
  append(`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, 'bot', true);
  setTimeout(() => {
    document.getElementById('ind').remove();
    let a = "";
    if (q.includes('website chatbot')) {
      a = `<strong>No, we don't build website chat bars.</strong> Buyers ignore website popups.<br><br>Hermia is backend <strong>SMS Infrastructure</strong>. The split-second a lead registers on portals, Hermia instantly texts their smartphone text inbox directly.`;
    } else if (q.includes('hallucinate')) {
      a = `<strong>Zero legal liabilities or hallucinations.</strong> Hermia uses rigid, pre-fixed conversion templates. It captures budget and finance status within strict guardrails—100% computational accuracy, 24/7.`;
    } else if (q.includes('setup')) {
      a = `<strong>Full system deployment takes under 72 hours.</strong> Our engineers hook up your active property feeds and sync data straight into your CRM (Zoho, HubSpot, Pipedrive) without altering agent workflows.`;
    }
    append(a + `<br><br><a href="apply.html" target="_parent" style="display:inline-block; padding:8px 12px; background:#C9A35B; color:#000; font-size:11px; font-weight:700; text-transform:uppercase; text-decoration:none; border-radius:5px;">Claim 3-Day Workspace →</a>`, 'bot');
  }, 1000);
}

function processInput() {
  const txt = inp.value.trim(); if(!txt) return;
  append(txt, 'user'); inp.value = '';
  append(`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, 'bot', true);
  setTimeout(() => {
    document.getElementById('ind').remove();
    const l = txt.toLowerCase();
    let reply = `Understood. Your operational metric ("${txt}") has been logged. Let's fast-track your setup parameters.`;
    if(l.includes('chat') || l.includes('widget')) {
      reply = `We simulate this on our site via text, but your actual buyers will get <strong>instant SMS text layers</strong> dropped right into their phone's native text messaging apps within 60 seconds.`;
    } else if(l.includes('setup') || l.includes('time')) {
      reply = `It takes exactly <strong>3 business days</strong> to connect Hermia's triage layers directly into your active CRM pipeline workspace.`;
    }
    append(reply + `<br><br><a href="apply.html" target="_parent" style="display:inline-block; padding:8px 12px; background:#C9A35B; color:#000; font-size:11px; font-weight:700; text-transform:uppercase; text-decoration:none; border-radius:5px;">Apply for Workspace Trial →</a>`, 'bot');
  }, 1200);
}
</script>
</body>
</html>
